apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      containers:
      - name: sample-app
        image: 192.168.1.11:30500/sample-app:9f4f435b8e093c8ff9e68e2d02a25422cbcab583
        ports:
        - containerPort: 80
